# One-click deploy config for Render (https://render.com).
# Render reads this "blueprint" and provisions the site automatically — the only
# thing you set by hand is your Anthropic API key.
services:
  - type: web
    name: medisim-er
    runtime: node
    plan: free
    # --include=dev forces build tools (vite, esbuild, typescript) to install
    # even though NODE_ENV=production is set for the running server.
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/server.cjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false # you paste your key into Render's dashboard; it is never committed
